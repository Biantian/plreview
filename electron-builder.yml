appId: com.plreview.desktop
productName: PLReview
directories:
  output: release
files:
  - .desktop-runtime/**/*
  - package.json
  - from: .next/standalone
    to: .next/standalone
    filter:
      - "**/*"
  - from: .next/standalone/node_modules
    to: .next/standalone/node_modules
    filter:
      - "**/*"
  - from: .next/static
    to: .next/standalone/.next/static
    filter:
      - "**/*"
  - from: node_modules/.prisma/client
    to: node_modules/.prisma/client
    filter:
      - "**/*"
asarUnpack:
  - .next/standalone/**/*
  - .next/static/**/*
  - node_modules/.prisma/client/**/*
extraMetadata:
  main: .desktop-runtime/electron/main.cjs
mac:
  category: public.app-category.productivity
  identity: null
  target:
    - dmg
win:
  target:
    - nsis
